<!DOCTYPE html>
<html>
<head>
  <title>Transport Cost Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="costing.css">
</head>
<body>

<h2>Transport Cost Analyzer - PRO</h2>

<div class="card">

  <label>Select SO</label>
  <select id="soSelect"></select>

  <label>Amount</label>
  <input type="number" id="amount">

  <label>CBM PPC</label>
  <input type="number" id="cbmPPC">

  <label>CBM EC</label>
  <input type="number" id="cbmEC">

  <h3>Expenses</h3>

  <div id="expenseContainer"></div>

  <button id="addExpenseBtn">+ Add Expense</button>

</div>

<div class="result-card">

  <h3>Results</h3>
  <p>Grand Total: <span id="grandTotal"></span></p>
  <p>PPC Cost: <span id="ppcCost"></span></p>
  <p>EC Cost: <span id="ecCost"></span></p>
  <p>Profit: <span id="profit"></span></p>

  <button id="saveCostBtn">Save / Update</button>

</div>

<script type="module" src="costing.js"></script>
</body>
</html>
